server {
    listen 80;
    server_name azanovretreat.com www.azanovretreat.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name azanovretreat.com www.azanovretreat.com;

    # ── SSL ─────────────────────────────────────────────────────
    # Place your certs in deploy/ssl/ (or use Certbot — see README)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Static files ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Cache images, fonts, etc. aggressively
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache CSS / JS
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Serve HTML with no cache (always fresh)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API proxy → Node.js container ───────────────────────────
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Allow JSON bodies
        client_max_body_size 1m;
    }

    # ── Fallback: serve index.html for any unknown path ─────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
